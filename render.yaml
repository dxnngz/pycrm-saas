services:
  # 1. Backend API (Node.js)
  - type: web
    name: pycrm-backend
    env: node
    plan: free
    rootDir: backend
    buildCommand: npm install --include=dev && npx prisma generate && npx prisma migrate deploy && npm run build
    startCommand: node dist/index.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: pycrm-db
          property: connectionString
      # REDIS_URL: Set manually in Render dashboard if you have an Upstash/Redis instance.
      # Example: rediss://default:PASSWORD@your-host.upstash.io:6379
      # The app works fully without Redis (PostgreSQL-only mode).
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_URL
        fromService:
          name: pycrm-frontend
          type: web
          property: url

  # 2. Frontend SPA (Static Site)
  - type: web
    name: pycrm-frontend
    env: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishDir: dist
    envVars:
      - key: VITE_API_URL
        fromService:
          name: pycrm-backend
          type: web
          property: url

databases:
  - name: pycrm-db
    plan: free
    postgresMajorVersion: 15
