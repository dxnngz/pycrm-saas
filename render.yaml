services:
  # 1. Backend API (Node.js)
  - type: web
    name: pycrm-backend
    env: node
    plan: pro
    rootDir: backend
    buildCommand: npm install --include=dev && npx prisma generate && (npx prisma migrate resolve --rolled-back "20260309232603_elite_hardening_soft_delete" || true) && npx prisma migrate deploy && npm run build
    startCommand: npm run start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: pycrm-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: pycrm-redis
          type: redis
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_URL
        fromService:
          name: pycrm-frontend
          type: web
          property: url

  # 2. Frontend SPA (Static Site)
  - type: web
    name: pycrm-frontend
    env: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishDir: dist
    envVars:
      - key: VITE_API_URL
        fromService:
          name: pycrm-backend
          type: web
          property: url

  # 3. Redis (Cache & Queues)
  - type: redis
    name: pycrm-redis
    plan: free
    ipAllowList: [] # Only allow internal access

databases:
  - name: pycrm-db
    plan: free
    postgresMajorVersion: 15
